include:
  - project: "waldur/waldur-pipelines"
    file: "/templates/stages.yml"
  - project: "waldur/waldur-pipelines"
    file: "/templates/release/publish.yml"

# Docker image publishing comes entirely from the shared publish.yml template
# (buildah, linux/amd64, Dockerfile at the repo root, pushed as
# opennode/${CI_PROJECT_NAME}); no overrides are needed.

Publish docs:
  stage: deploy
  image:
    name: registry.hpc.ut.ee/mirror/alpine/git:v2.30.2
    entrypoint: [""]
  interruptible: true
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
  script:
    - cd /tmp/
    - git clone "https://gitlab-ci-token:$GITLAB_TOKEN@$CI_SERVER_HOST/waldur/waldur-docs.git"
    - git config --global user.name "$GITLAB_USER_NAME"
    - git config --global user.email "$GITLAB_USER_EMAIL"
    - cp -v $CI_PROJECT_DIR/docs/systemd-instructions.md /tmp/waldur-docs/docs/integrations/glauth/
    - cd /tmp/waldur-docs/
    - git add docs/integrations/glauth/
    - git commit -m "Add systemd-instructions" || exit 0
    - git branch new-glauth-systemd-instructions
    - git push --set-upstream origin new-glauth-systemd-instructions:master
